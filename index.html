<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #fbf7f4;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 42px;
      font-weight: 400;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .names {
      font-size: 26px;
      margin-bottom: 25px;
      color: #555;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 25px;
      margin: 18px 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .date-box {
      display: inline-block;
      padding: 15px 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      margin-top: 10px;
    }

    .month {
      font-size: 14px;
      letter-spacing: 2px;
      color: #888;
    }

    .day {
      font-size: 34px;
      font-weight: bold;
      margin: 5px 0;
    }

    .year {
      font-size: 14px;
      color: #888;
    }

    iframe {
      width: 100%;
      height: 280px;
      border: 0;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 24px;
      background: #b86b77;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #9e5662;
    }

    .countdown {
      font-size: 20px;
      color: #444;
      margin-top: 10px;
    }

    .footer {
      margin-top: 35px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>You're Invited</h1>

    <div class="names">
      <strong>Alex</strong> & <strong>Jordan</strong>
    </div>

    <!-- COUNTDOWN -->
    <div class="card">
      <h3>Countdown to the Big Day</h3>
      <div class="countdown" id="countdown"></div>
    </div>

    <!-- DATE / CALENDAR -->
    <div class="card">
      <h3>Wedding Date</h3>
      <div class="date-box">
        <div class="month">JULY</div>
        <div class="day">12</div>
        <div class="year">2026</div>
      </div>
    </div>

    <!-- LOCATION -->
    <div class="card">
      <h3>Location</h3>
      <p>Wedding Venue</p>

      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d..."
        loading="lazy">
      </iframe>
    </div>

    <!-- RSVP -->
    <div class="card">
      <h3>RSVP</h3>
      <p>Please let us know if you will join us</p>

      <a class="btn" href="YOUR_GOOGLE_FORM_LINK" target="_blank">
        Respond to RSVP
      </a>
    </div>

    <div class="footer">
      We can’t wait to celebrate with you ❤️
    </div>

  </div>

  <script>
    const weddingDate = new Date("2026-07-12T00:00:00").getTime();

    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

      document.getElementById("countdown").innerHTML =
        days + " days " + hours + " hrs " + minutes + " min";

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "Today is the day ❤️";
      }
    }, 1000);
  </script>
</body>
</html>
